name: Auto Sync WeRead Notes to Notion

on:
  schedule:
    # 每天北京时间上午 8 点（UTC 0:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Configure environment
        run: |
          cat > .env << EOF
          NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE=${{ secrets.NOTION_PAGE }}
          WEREAD_API_KEY=${{ secrets.WEREAD_API_KEY }}
          EOF
          
      - name: Run sync
        run: python -m weread2notionpro
